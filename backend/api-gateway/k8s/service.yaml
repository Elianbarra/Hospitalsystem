apiVersion: v1
kind: Service
metadata:
  name: api-gateway-service
  namespace: hospital
  labels:
    app: api-gateway
spec:
  selector:
    app: api-gateway
  ports:
    - name: http
      protocol: TCP
      port: 8091
      targetPort: 8091
  # LoadBalancer → único punto de entrada externo al cluster
  # El BFF pasa a ClusterIP cuando este gateway esté activo en producción
  # En producción: cambiar a ClusterIP + Ingress con TLS
  type: LoadBalancer
