apiVersion: apps/v1
kind: Deployment
metadata:
  name: ms-waitlist
  namespace: hospital
  labels:
    app: ms-waitlist
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ms-waitlist
  template:
    metadata:
      labels:
        app: ms-waitlist
    spec:
      containers:
        - name: ms-waitlist
          image: ms-waitlist:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8083
          envFrom:
            - configMapRef:
                name: ms-waitlist-config
            - secretRef:
                name: ms-waitlist-secret
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: ms-waitlist-svc
  namespace: hospital
spec:
  selector:
    app: ms-waitlist
  ports:
    - port: 8083
      targetPort: 8083
  type: ClusterIP
