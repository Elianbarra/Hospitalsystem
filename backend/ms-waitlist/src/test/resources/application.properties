# ─── Overrides para entorno de test ─────────────────────────────────────────
# Ms-Waitlist tiene defaults en application.yml pero los sobreescribimos para
# usar H2 en lugar de PostgreSQL y evitar conexiones externas.

spring.datasource.url=jdbc:h2:mem:testwaitlist;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

spring.flyway.enabled=false

MS_AUTH_URL=http://localhost:9999
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:9999/.well-known/jwks.json
