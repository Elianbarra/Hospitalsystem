spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  flyway:
    enabled: false

security:
  jwt:
    issuer: http://localhost:8080
    access-token-minutes: 30
    private-key-path: ${user.dir}/src/test/resources/keys/private_key.pem
    public-key-path: ${user.dir}/src/test/resources/keys/public_key.pem
