apiVersion: v1
kind: ConfigMap
metadata:
  name: ms-auth-config
  namespace: hospital
  labels:
    app: ms-auth
data:
  SERVER_PORT: "8080"
  SECURITY_JWT_ISSUER: "http://ms-auth-service:8080"
  SECURITY_JWT_ACCESS_TOKEN_MINUTES: "30"
  SECURITY_JWT_PRIVATE_KEY_PATH: "/keys/private_key.pem"
  SECURITY_JWT_PUBLIC_KEY_PATH: "/keys/public_key.pem"
