# ─── Overrides para entorno de test ─────────────────────────────────────────
# Reemplaza variables de entorno sin valor por defecto con valores seguros.
# Aplica a todos los tests del módulo (unitarios y de integración).

# H2 en modo PostgreSQL — sin necesidad de base de datos externa
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# Flyway desactivado — las migraciones usan sintaxis específica de PostgreSQL
spring.flyway.enabled=false

# Valores ficticios para placeholders sin default en application.yml
MS_AUTH_URL=http://localhost:9999
MS_USER_URL=http://localhost:9998
DB_URL=jdbc:h2:mem:testdb
DB_USER=sa
DB_PASS=

# URI estática para que Spring no intente conectar al JWK endpoint al arrancar
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:9999/.well-known/jwks.json
ms-user.base-url=http://localhost:9998
