# =============================================================================
# SECRETS — ms-appointment
# Se usan dos secrets separados por responsabilidad:
#   1. ms-appointment-db-secret   → credenciales de la base de datos
#   2. ms-appointment-app-secret  → URLs privadas y futuros tokens/llaves
#
# IMPORTANTE: Este archivo es una PLANTILLA. Reemplaza los valores antes
# de aplicarlo. No subas este archivo con secretos reales a Git.
# Añade "k8s/secret.yaml" (o "k8s/*secret*") a tu .gitignore.
#
# Aplica con:   kubectl apply -f k8s/secret.yaml
# =============================================================================

# ── 1. Credenciales de base de datos ─────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: ms-appointment-db-secret
  namespace: hospital
  labels:
    app: ms-appointment
    tier: database
type: Opaque
stringData:                         # stringData → K8s codifica a base64 automáticamente
  POSTGRES_USER:     "neondb_owner"
  POSTGRES_PASSWORD: "npg_mSvx5zk9NTHq"
  DB_URL:            "jdbc:postgresql://ep-patient-silence-ad1s4w9m-pooler.c-2.us-east-1.aws.neon.tech/msappointment_db?sslmode=require"

---

# ── 2. Secretos de la aplicación ─────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: ms-appointment-app-secret
  namespace: hospital
  labels:
    app: ms-appointment
    tier: backend
type: Opaque
stringData:
  # Reservado para las llaves PEM / JWKS cuando MS-AUTH implemente el par de llaves
  # JWT_PUBLIC_KEY: |
  #   -----BEGIN PUBLIC KEY-----
  #   <contenido del archivo .pem>
  #   -----END PUBLIC KEY-----
  PLACEHOLDER: "sin-secretos-de-app-todavia"
