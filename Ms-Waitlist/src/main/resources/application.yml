spring:
  application:
    name: ms-waitlist

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/mswaitlist_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 3
      minimum-idle: 0
      max-lifetime: 30000
      keepalive-time: 15000
      connection-timeout: 10000
      idle-timeout: 20000
      connection-test-query: SELECT 1

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${MS_AUTH_URL:http://localhost:8080}/.well-known/jwks.json

server:
  port: 8083
