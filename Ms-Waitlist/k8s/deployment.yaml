apiVersion: apps/v1
kind: Deployment
metadata:
  name: ms-waitlist
  namespace: hospital
  labels:
    app: ms-waitlist
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ms-waitlist
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: ms-waitlist
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: ms-waitlist
                topologyKey: kubernetes.io/hostname
      containers:
        - name: ms-waitlist
          image: ms-waitlist:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8083
          envFrom:
            - configMapRef:
                name: ms-waitlist-config
            - secretRef:
                name: ms-waitlist-secret
          # Sin base de datos — Spring Boot arranca rápido
          startupProbe:
            tcpSocket:
              port: 8083
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 12
          readinessProbe:
            tcpSocket:
              port: 8083
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: 8083
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
