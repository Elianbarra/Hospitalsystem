spring.application.name=bff

# Puerto del BFF (distinto a los microservicios: 8080-8083)
server.port=${PORT:8090}

# ── OAuth2 Resource Server — valida el JWT del cliente antes de reenviar ──────
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${MS_AUTH_URL:http://localhost:8080}/.well-known/jwks.json

# ── Microservicios operativos ─────────────────────────────────────────────────
ms.auth.url=${MS_AUTH_URL:http://localhost:8080}
ms.user.url=${MS_USER_URL:http://localhost:8081}

# ── Microservicios pendientes de implementación ───────────────────────────────
ms.appointments.url=${MS_APPOINTMENTS_URL:http://localhost:8082}
ms.waitlist.url=${MS_WAITLIST_URL:http://localhost:8083}

# ── CORS ─────────────────────────────────────────────────────────────────────
# En producción: URL del frontend desplegado (ej. https://frontend.vercel.app)
frontend.url=${FRONTEND_URL:http://localhost:3001}

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.cl.rednorte.bff=DEBUG
