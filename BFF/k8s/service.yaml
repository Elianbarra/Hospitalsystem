apiVersion: v1
kind: Service
metadata:
  name: bff-service
  namespace: hospital
  labels:
    app: bff
spec:
  selector:
    app: bff
  ports:
    - name: http
      protocol: TCP
      port: 8090
      targetPort: 8090
  # LoadBalancer → expone el BFF en localhost:8090 en Docker Desktop
  # En producción cambiar a ClusterIP + Ingress
  type: LoadBalancer
