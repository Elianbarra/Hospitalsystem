spring:
  application:
    name: ms-auth

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/msauth_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 3
      minimum-idle: 0
      max-lifetime: 30000
      keepalive-time: 15000
      connection-timeout: 10000
      idle-timeout: 20000
      connection-test-query: SELECT 1

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1

server:
  port: 8080

security:
  jwt:
    issuer: ${SECURITY_JWT_ISSUER:http://localhost:8080}
    access-token-minutes: ${SECURITY_JWT_ACCESS_TOKEN_MINUTES:30}
    private-key-path: ${SECURITY_JWT_PRIVATE_KEY_PATH:./private_key.pem}
    public-key-path: ${SECURITY_JWT_PUBLIC_KEY_PATH:./public_key.pem}
