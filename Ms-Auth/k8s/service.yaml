apiVersion: v1
kind: Service
metadata:
  name: ms-auth-service
  namespace: hospital
  labels:
    app: ms-auth
spec:
  selector:
    app: ms-auth
  ports:
    - name: http
      protocol: TCP
      port: 8080
      targetPort: 8080
  # ClusterIP — solo accesible internamente.
  # El BFF y otros ms acceden como: http://ms-auth-service:8080
  type: ClusterIP
