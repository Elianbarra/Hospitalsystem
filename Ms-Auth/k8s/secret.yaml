# =============================================================================
# SECRETS — ms-auth
# IMPORTANTE: Reemplaza los valores antes de aplicar.
# No subas este archivo con secretos reales a Git.
# =============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: ms-auth-db-secret
  namespace: hospital
  labels:
    app: ms-auth
    tier: database
type: Opaque
stringData:
  POSTGRES_USER:     "msauth_user"
  POSTGRES_PASSWORD: "CHANGE_ME_DB_PASSWORD"
  DB_URL:            "jdbc:postgresql://ms-auth-postgres-svc:5432/msauth_db"
