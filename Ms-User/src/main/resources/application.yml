spring:
  application:
    name: ms-user

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/msuser_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 3
      minimum-idle: 0
      max-lifetime: 30000
      keepalive-time: 15000
      connection-timeout: 10000
      idle-timeout: 20000
      connection-test-query: SELECT 1

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1

  security:
    oauth2:
      resourceserver:
        jwt:
          # Descarga la clave pública de ms-auth al arrancar y cachea localmente
          jwk-set-uri: ${MS_AUTH_URL:http://localhost:8080}/.well-known/jwks.json

server:
  port: 8081

# URL de ms-auth usada por el RestClient para registrar credenciales
ms-auth:
  base-url: ${MS_AUTH_URL:http://localhost:8080}

logging:
  level:
    com.hospital.msuser: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
    com.zaxxer.hikari: DEBUG
